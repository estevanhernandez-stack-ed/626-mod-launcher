# 626 Mod Launcher -- tag-triggered release pipeline.
#
# Trigger: pushing a tag matching `v*.*.*` or `v*.*.*.*` (e.g. v0.2.0).
# Output: a DRAFT GitHub Release with 626ModLauncher-win-Setup.exe + delta nupkg +
# releases.win.json attached. Maintainer reviews assets + notes, then clicks Publish.
#
# To auto-publish (skip the draft step), use Actions -> Release -> Run workflow with
# publish=true. Tag-push always produces a draft so a botched build can't go live silently.

name: release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: true
        type: string
      publish:
        description: 'Auto-publish (vs draft)'
        required: false
        type: boolean
        default: false
      pre:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      abstractionsOnly:
        description: 'Publish ONLY the Abstractions NuGet (skip the Velopack release) — standalone contract publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # create + upload to Releases

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  release:
    name: build + pack + upload
    # Skip the full Velopack release when a manual dispatch only wants the Abstractions NuGet published.
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.abstractionsOnly }}
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vpk reads tag history when computing deltas

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Resolve version + tag
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
            $v = $tag -replace '^v', ''
          } else {
            $v = '${{ inputs.version }}'
            $tag = "v$v"
          }
          if ($v -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Invalid version: '$v'. Expected semver-ish (e.g. 0.2.0)."
          }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          "tag=$tag"   | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved: $tag (version $v)"

      - name: Restore
        run: dotnet restore src/ModManager.App/ModManager.App.csproj

      - name: Test (Core)
        # Explicit test project — bare `dotnet test` at the solution root hangs building WinUI.
        run: dotnet test tests/ModManager.Tests/ModManager.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      - name: Test (Nexus plugin)
        # The plugin test project refs only the plugin + Abstractions (no WinUI, no Core), so running it
        # explicitly here is safe — it can't trigger the bare-dotnet WinUI hang the Core step guards
        # against. Without this, the relocated NexusModSource HTTP coverage runs locally only and a
        # regression in the plugin's read/write surface would pass CI green.
        run: dotnet test tests/ModManager.Plugin.Nexus.Tests/ModManager.Plugin.Nexus.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      - name: Test (Nexus key validate)
        # The App-side validate path (GET /v1/users/validate.json) is covered by NexusKeyValidator, a pure
        # WinUI-free helper this project source-links directly — so it refs neither WinUI nor Core and is
        # likewise safe to run explicitly. Guards Connect Nexus / premium detection on the release gate.
        run: dotnet test tests/ModManager.App.NexusValidate.Tests/ModManager.App.NexusValidate.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      - name: Fetch prior release (for delta generation)
        # First-ever release: no prior release exists -> non-zero exit -> tolerated.
        # All subsequent releases: this populates dist/release/ with the previous
        # *-full.nupkg so `vpk pack` can compute a delta against it.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'dist/release' -Force | Out-Null
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "$env:GITHUB_TOKEN" `
            --outputDir 'dist/release'

      - name: Build Velopack release
        shell: pwsh
        run: |
          pwsh scripts/build-velopack-release.ps1 `
            -Version '${{ steps.ver.outputs.version }}' `
            -NoClean

      - name: Upload artifacts (audit trail)
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ steps.ver.outputs.version }}
          path: dist/release/*
          retention-days: 30
          if-no-files-found: error

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $args = @(
            'upload', 'github'
            '--repoUrl',     "https://github.com/${{ github.repository }}"
            '--token',       "$env:GITHUB_TOKEN"
            '--tag',         '${{ steps.ver.outputs.tag }}'
            '--releaseName', '626 Mod Launcher ${{ steps.ver.outputs.tag }}'
            '--outputDir',   'dist/release'
            '--merge'
          )
          if ('${{ inputs.publish }}' -eq 'true') { $args += '--publish' }
          if ('${{ inputs.pre }}'     -eq 'true') { $args += '--pre' }
          Write-Host "vpk $($args -join ' ')"
          vpk @args
          if ($LASTEXITCODE -ne 0) { throw "vpk upload failed (exit $LASTEXITCODE)" }

      - name: Summary
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          $url = "https://github.com/${{ github.repository }}/releases/tag/$tag"
          $isDraft = '${{ inputs.publish }}' -ne 'true'
          $state = if ($isDraft) { 'DRAFT (review + publish manually)' } else { 'PUBLISHED' }
          @"
          ## 626 Mod Launcher $tag
          - State: **$state**
          - Release: $url
          - Artifacts: 626ModLauncher-win-Setup.exe + *-full.nupkg + *-delta.nupkg + releases.win.json

          $(if ($isDraft) { 'Open the release URL, review the assets, add release notes, then click ' + '**Publish release**' + '.' } else { 'Live now. Auto-update will roll out to existing installs within 24h (debounced).' })
          "@ | Out-File $env:GITHUB_STEP_SUMMARY -Append

  publish-abstractions:
    name: publish Abstractions (NuGet, keyless OIDC)
    # The off-Store plugin repo (626-mod-plugins) builds its plugin against this contract package.
    # Keyless via NuGet Trusted Publishing — the policy is scoped to THIS workflow file (release.yml),
    # so the OIDC token authorizes the push; no API key is stored anywhere. Runs on a release tag
    # (publishing the contract alongside the app) and on a manual dispatch (incl. abstractionsOnly for a
    # standalone contract publish). The package version tracks the launcher version (drives minBinaryVersion).
    #
    # Gate: NuGet.org pushes are immutable, so an UNTESTED contract must never ship. `needs: [release]`
    # orders this after the build/test job; the `if:` runs it only when release SUCCEEDED or was SKIPPED —
    # NEVER when it failed. A skip is not a failure, so the abstractionsOnly dispatch path (where release's
    # own `if:` skips it) still publishes. Matrix:
    #   tag push, release passes  -> release success  -> publish RUNS
    #   tag push, release fails    -> release failure  -> publish SKIPPED (the fix)
    #   abstractionsOnly dispatch  -> release skipped  -> publish RUNS
    needs: [release]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write   # OIDC token for NuGet Trusted Publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') { $v = $env:GITHUB_REF_NAME -replace '^v', '' }
          else { $v = '${{ inputs.version }}' }
          if ($v -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { throw "Invalid version: '$v'. Expected semver-ish (e.g. 0.6.0)." }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Abstractions package version: $v"

      - name: Pack Abstractions
        run: dotnet pack src/ModManager.Plugins.Abstractions/ModManager.Plugins.Abstractions.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o ./nupkg

      - name: NuGet login (Trusted Publishing / OIDC)
        id: login
        # Third-party action with id-token (OIDC) access — pinned to a full commit SHA, not the mutable
        # v1 tag, so a repointed tag can't exfiltrate the publish token. Bump deliberately (track via Dependabot).
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1.2.0
        with:
          user: 626labs

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
